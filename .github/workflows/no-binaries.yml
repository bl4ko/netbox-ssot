name: No binary files

on:
  pull_request:
    branches: [main]

jobs:
  check-binaries:
    name: Check for binary files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for binary files in PR
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Get list of added/modified files in the PR
          # git diff --numstat shows "-" for both additions and deletions on binary files
          BINARY_FILES=$(git diff --numstat "origin/$BASE_REF"...HEAD | awk '$1 == "-" && $2 == "-" { print $3 }')

          if [ -n "$BINARY_FILES" ]; then
            echo "::error::Binary files detected in PR:"
            echo "$BINARY_FILES"
            echo ""
            echo "Binary files should not be committed to the repository."
            echo "Please remove them and update .gitignore if needed."
            exit 1
          fi

          echo "No binary files detected."
