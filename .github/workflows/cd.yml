name: Deploy image to ghcr.io

on:
  workflow_dispatch:
  push:
    tags:
      - v*
    paths:
      - cmd/**
      - internal/**
      - pkg/**
      - Dockerfile
      - .dockerignore
      - .golangci.yml
      - go.mod
      - go.sum

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Set created date for image
        id: build_date
        run: echo "CREATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Build and push final image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v6,linux/arm/v7
          tags: |
            ghcr.io/bl4ko/netbox-ssot:latest
            ghcr.io/bl4ko/netbox-ssot:${{ github.ref_name }}
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            CREATED=${{ steps.build_date.outputs.CREATED }}
            COMMIT=${{ github.sha }}
